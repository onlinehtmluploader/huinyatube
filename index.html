<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ХуйняТуб</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <nav class="bg-black p-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <h1 class="text-3xl font-bold text-red-600">ХуйняТуб</h1>
    </div>
    <div class="flex-1 max-w-xl mx-8">
      <input id="search" type="text" placeholder="Поиск на ХуйняТубе..." 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-full px-6 py-3 focus:outline-none">
    </div>
    <div class="flex items-center gap-4">
      <button onclick="uploadVideo()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-full flex items-center gap-2">
        <i class="fas fa-upload"></i> Загрузить
      </button>
      <div id="user-info" class="flex items-center gap-3 cursor-pointer" onclick="showProfile()">
        <img id="avatar" src="https://i.pravatar.cc/40" class="w-9 h-9 rounded-full">
        <span id="username" class="font-medium">Гость</span>
      </div>
    </div>
  </nav>

  <div class="flex">
    <!-- Sidebar -->
    <div class="w-64 bg-black h-screen p-4 fixed">
      <div class="space-y-6">
        <a href="#" class="flex items-center gap-4 text-lg hover:bg-zinc-900 p-3 rounded-xl"><i class="fas fa-home"></i> Главная</a>
        <a href="#" class="flex items-center gap-4 text-lg hover:bg-zinc-900 p-3 rounded-xl"><i class="fas fa-fire"></i> В тренде</a>
        <a href="#" class="flex items-center gap-4 text-lg hover:bg-zinc-900 p-3 rounded-xl"><i class="fas fa-history"></i> История</a>
        <hr class="border-zinc-800">
        <h3 class="text-zinc-400 px-3">Подписки</h3>
        <div id="subscriptions"></div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 p-8 w-full">
      <div id="video-grid" class="video-grid"></div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div id="upload-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 p-8 rounded-2xl w-[500px]">
      <h2 class="text-2xl mb-6">Загрузить видео на ХуйняТуб</h2>
      <input type="file" id="video-file" accept="video/*" class="mb-4 block w-full">
      <input type="text" id="video-title" placeholder="Название видео" class="w-full bg-zinc-800 p-4 rounded-xl mb-4">
      <textarea id="video-desc" placeholder="Описание" class="w-full bg-zinc-800 p-4 rounded-xl h-32"></textarea>
      <div class="flex gap-4 mt-6">
        <button onclick="closeModal()" class="flex-1 py-4 bg-zinc-800 rounded-xl">Отмена</button>
        <button onclick="submitVideo()" class="flex-1 py-4 bg-red-600 rounded-xl">Опубликовать</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('ht_users')) || [];
    let videos = JSON.parse(localStorage.getItem('ht_videos')) || [];

    // Первый пользователь = админ
    function checkFirstAdmin() {
      if (users.length === 0) {
        currentUser = { id: 1, username: "Админ", verified: true, isAdmin: true, avatar: "https://i.pravatar.cc/150?u=admin" };
        users.push(currentUser);
        localStorage.setItem('ht_users', JSON.stringify(users));
      }
    }

    function loginAs(username) {
      currentUser = users.find(u => u.username === username) || users[0];
      document.getElementById('username').textContent = currentUser.username;
      if (currentUser.verified) {
        document.getElementById('username').innerHTML += ' <span class="text-blue-500">✓</span>';
      }
    }

    function renderVideos(filteredVideos = videos) {
      const grid = document.getElementById('video-grid');
      grid.innerHTML = '';
      
      filteredVideos.forEach(video => {
        const div = document.createElement('div');
        div.className = "cursor-pointer";
        div.innerHTML = `
          <div class="relative">
            <video src="${video.url}" class="w-full aspect-video object-cover rounded-xl" muted></video>
            <div class="absolute bottom-2 right-2 bg-black/70 px-2 py-1 text-xs rounded">${video.duration || '0:00'}</div>
          </div>
          <div class="flex gap-3 mt-3">
            <img src="${video.authorAvatar}" class="w-9 h-9 rounded-full mt-1">
            <div>
              <h3 class="font-medium leading-tight">${video.title}</h3>
              <p class="text-zinc-400 text-sm">${video.author} ${video.verified ? '✓' : ''}</p>
              <p class="text-zinc-500 text-sm">${video.views || 0} просмотров</p>
            </div>
          </div>
        `;
        div.onclick = () => watchVideo(video);
        grid.appendChild(div);
      });
    }

    function watchVideo(video) {
      alert(`Сейчас играет: ${video.title}\n\n(В реальной версии здесь будет полноценный плеер с таймкодами и субтитрами)`);
      // Здесь можно открыть модальное окно с <video> controls + таймкоды
    }

    function uploadVideo() {
      if (!currentUser) return alert("Сначала войдите");
      document.getElementById('upload-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('upload-modal').classList.add('hidden');
    }

    function submitVideo() {
      const file = document.getElementById('video-file').files[0];
      const title = document.getElementById('video-title').value;

      if (!file || !title) return alert("Выберите файл и название");

      const url = URL.createObjectURL(file);

      const newVideo = {
        id: Date.now(),
        title,
        url,
        author: currentUser.username,
        authorAvatar: currentUser.avatar,
        verified: currentUser.verified,
        description: document.getElementById('video-desc').value,
        views: 0,
        uploadedAt: new Date().toISOString()
      };

      videos.unshift(newVideo);
      localStorage.setItem('ht_videos', JSON.stringify(videos));
      renderVideos();
      closeModal();
      alert("Видео загружено! Только реальное видео от реального человека.");
    }

    function showProfile() {
      const name = prompt("Ваш никнейм (для демо):", currentUser ? currentUser.username : "Пользователь");
      if (name) {
        if (!users.find(u => u.username === name)) {
          const newUser = {
            id: Date.now(),
            username: name,
            verified: false,
            isAdmin: users.length === 0,
            avatar: `https://i.pravatar.cc/150?u=${name}`
          };
          users.push(newUser);
          localStorage.setItem('ht_users', JSON.stringify(users));
        }
        loginAs(name);
      }
    }

    // Init
    checkFirstAdmin();
    loginAs(users[0].username);
    renderVideos();

    // Поиск
    document.getElementById('search').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = videos.filter(v => v.title.toLowerCase().includes(term));
      renderVideos(filtered);
    });
  </script>
</body>
</html>
